#-------------
# Docker build
#-------------

.build-docker:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
  - factory-dind
  stage: docker
  script:
  - docker info
  - make -C docker build deliver FLAVOR=$QGIS_FLAVOR LIZCLOUD=yes
  - make -C docker build-ci deliver-ci FLAVOR=$QGIS_FLAVOR
  - cat $DOCKERPASS | docker login -u 3liz --password-stdin
  - make -C docker push-unstable FLAVOR=$QGIS_FLAVOR
  environment:
    name: snap
  artifacts:
    paths:
    - "docker/factory-${QGIS_FLAVOR}.manifest"
  rules:
    - !reference [.release_rules]
    - if: $RELEASE_BRANCH == "true"
  variables:
    DOCKER_ATTESTATION: 'true'
    DOCKER_DRIVER: ''

# XXX Matrix build does not allow using dependencies

build-docker:release:
  extends: .build-docker
  dependencies:
      - build-binaries-trixie
      - build-extensions:release
  variables:
    QGIS_FLAVOR: "release"

build-docker:ltr:
  extends: .build-docker
  dependencies:
      - build-binaries
      - build-extensions:ltr
  variables:
    QGIS_FLAVOR: "ltr"

build-docker:3.40:
  extends: .build-docker
  dependencies:
      - build-binaries
      - build-extensions:3.40
  variables:
    QGIS_FLAVOR: "3.40"

#
# No QGIS
#

build-docker:noqgis:
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: docker
  script:
  - make -C docker noqgis-build noqgis-deliver
  only:
    refs:
    - tags
    - main
  tags:
  - factory-dind
  artifacts:
    paths:
    - "docker/factory-noqgis.manifest"
  variables:
    DOCKER_ATTESTATION: 'true'
    DOCKER_DRIVER: ''

# -----------
# release
# ----------
.release:
  rules:
    - !reference [.release_rules]
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  stage: release
  script:
    - release-image qjazz-$QGIS_FLAVOR
  environment:
    name: production
  variables:
    FACTORY_MANIFEST: "docker/factory-${QGIS_FLAVOR}.manifest"
  when: manual
  # See https://about.gitlab.com/blog/2021/05/20/dag-manual-fix/#what-if-i-dont-want-this-new-behavior
  allow_failure: false
  tags:
    - factory-dind

release:release:
  extends: .release
  variables:
    QGIS_FLAVOR: release
  dependencies:
    - build-docker:release

release:ltr:
  extends: .release
  variables:
    QGIS_FLAVOR: ltr
  dependencies:
    - build-docker:ltr

release:3.40:
  extends: .release
  variables:
    QGIS_FLAVOR: "3.40"
  dependencies:
    - build-docker:3.40

#
# No QGIS
#

release:noqgis:
  rules:
    - !reference [.release_rules]
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: release
  script:
    - release-image qjazz-noqgis
  environment:
    name: production
  variables:
    FACTORY_MANIFEST: "docker/factory-noqgis.manifest"
  when: manual
  allow_failure: false
  dependencies:
    - build-docker:noqgis

# ------------------
# push to docker hub
# ------------------

.push:
  rules:
    - !reference [.release_rules]
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: post-release
  script:
    - push-to-docker-hub --clean
  environment:
    name: production
  variables:
    FACTORY_MANIFEST: "docker/factory-${QGIS_FLAVOR}.manifest"

push:release:
  extends: .push
  variables:
    QGIS_FLAVOR: release
  dependencies:
    - build-docker:release

push:ltr:
  extends: .push
  variables:
    QGIS_FLAVOR: ltr
  dependencies:
    - build-docker:ltr

push:3.40:
  extends: .push
  variables:
    QGIS_FLAVOR: "3.40"
  dependencies:
    - build-docker:3.40

push:noqgis:
  rules:
    - !reference [.release_rules]
  image: ${REGISTRY_URL}/factory-ci-runner:factory-ci
  tags:
    - factory-dind
  stage: post-release
  script:
    - push-to-docker-hub --clean
  environment:
    name: production
  variables:
    FACTORY_MANIFEST: "docker/factory-noqgis.manifest"
  dependencies:
    - build-docker:noqgis
