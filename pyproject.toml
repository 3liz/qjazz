
#
# Define uv workspace and dependency groups
[dependency-groups]
dev = [
    "coverage[toml]",
    "maturin<=2.0.0",
    "grpcio-tools",
    "qgis-plugin-manager",
    "setuptools",      # Needed for building C extension
    "packaging>=24.2", # Needed by setuptools
    {include-group = "tests"},
    {include-group = "lint"},
]
tests = [
    "pytest",
    "pytest-asyncio",
    "pytest-aiohttp",
    "pytest-httpserver",
    "coverage",
]
lint = [
    "ruff",
    "mypy",
    "mypy-extensions",
    "types-protobuf",
    "types-psutil",
    "types-PyYAML",
    "types-requests",
    "types-aiofiles",
    "bandit",
    "vulture",
]
doc = [
    "sphinx",
    "sphinx-rtd-theme",
    "sphinxcontrib-httpdomain",
    "swagger-plugin-for-sphinx",
]
tools = [
    "ipython",
]

[tool.uv.workspace]
members = [
    "qjazz-contrib",
    "qjazz-processes",
    "qjazz-server/qjazz-rpc",
    "qjazz-server/qjazz-map",
    "qjazz-metapackage",
]


